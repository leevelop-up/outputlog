services:

  # ── MySQL ────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: outputlog_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-outputlog1234}
      MYSQL_DATABASE: nsuslab_db
      MYSQL_USER: ${DB_USERNAME:-outputlog}
      MYSQL_PASSWORD: ${DB_PASSWORD:-outputlog1234}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - outputlog_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: outputlog_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis1234} --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - outputlog_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis1234}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (Spring Boot) ────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: outputlog_backend
    restart: unless-stopped
    environment:
      DB_USERNAME: ${DB_USERNAME:-outputlog}
      DB_PASSWORD: ${DB_PASSWORD:-outputlog1234}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis1234}
      JWT_SECRET: ${JWT_SECRET:-outputlog-jwt-secret-key-must-be-at-least-256-bits-long!!}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:80}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      OAUTH2_REDIRECT_URI: ${OAUTH2_REDIRECT_URI:-https://outputlog.com/oauth-callback}
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/nsuslab_db?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - outputlog_net

  # ── Frontend (React + Nginx) ─────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    container_name: outputlog_frontend
    restart: unless-stopped
    networks:
      - outputlog_net

  # ── Nginx (리버스 프록시) ──────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: outputlog_nginx
    restart: unless-stopped
    ports:
      - "${PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - outputlog_net

networks:
  outputlog_net:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
