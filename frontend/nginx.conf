server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # React Router — 모든 경로를 index.html로
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
