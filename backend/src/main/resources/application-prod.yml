spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://db:3306/nsuslab_db?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

app:
  cors:
    allowed-origins: ${CORS_ORIGINS:https://outputlog.com}
  oauth2:
    redirect-uri: ${OAUTH2_REDIRECT_URI:https://outputlog.com/oauth-callback}
